<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Budaya Batak</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0c0f 0%, #1a1e24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Background Pattern - Motif Ulos Modern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(180, 30, 30, 0.03) 0px, rgba(180, 30, 30, 0.03) 2px, transparent 2px, transparent 10px),
                repeating-linear-gradient(135deg, rgba(212, 175, 55, 0.03) 0px, rgba(212, 175, 55, 0.03) 3px, transparent 3px, transparent 15px);
            pointer-events: none;
        }

        .floating-ornament {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 50%, rgba(180, 30, 30, 0.15), transparent 70%);
            top: -150px;
            right: -150px;
            animation: float 20s infinite ease-in-out;
        }

        .floating-ornament-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 30%, rgba(212, 175, 55, 0.12), transparent 70%);
            bottom: -200px;
            left: -200px;
            animation: float 25s infinite ease-in-out reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, 30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .login-container {
            max-width: 420px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            width: 90%;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 30px 60px -15px rgba(180, 30, 30, 0.3),
                0 0 0 2px rgba(212, 175, 55, 0.3);
        }

        .logo-wrapper {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #B41E1E, #8B1A1A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            border: 3px solid #D4AF37;
            box-shadow: 0 10px 25px -5px rgba(180, 30, 30, 0.5);
        }

        .logo-icon i {
            font-size: 45px;
            color: #D4AF37;
        }

        .logo-wrapper h2 {
            color: #1a1e24;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .logo-wrapper p {
            color: #666;
            font-size: 14px;
            font-weight: 400;
        }

        .title-decoration {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 5px 0 20px;
        }

        .title-decoration span {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
        }

        .title-decoration i {
            color: #B41E1E;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #2d3436;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #B41E1E;
            font-size: 16px;
            z-index: 2;
        }

        .form-control {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: 2px solid #edf2f7;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #B41E1E;
            background: white;
            box-shadow: 0 0 0 4px rgba(180, 30, 30, 0.1);
        }

        .form-control::placeholder {
            color: #a0aec0;
            font-weight: 300;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 2;
            background: transparent;
            border: none;
        }

        .toggle-password:hover {
            color: #B41E1E;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #B41E1E;
            cursor: pointer;
        }

        .remember-me label {
            color: #4a5568;
            font-size: 14px;
            cursor: pointer;
        }

        .forgot-password {
            color: #B41E1E;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #8B1A1A;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #B41E1E, #8B1A1A);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #D4AF37;
            box-shadow: 0 8px 20px -5px rgba(180, 30, 30, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #8B1A1A, #B41E1E);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -8px rgba(180, 30, 30, 0.6);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .demo-credentials {
            margin-top: 25px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px dashed #D4AF37;
        }

        .demo-credentials p {
            margin: 5px 0;
            color: #4a5568;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .demo-credentials i {
            color: #B41E1E;
            font-size: 14px;
            width: 20px;
        }

        .demo-credentials strong {
            color: #B41E1E;
            font-weight: 600;
        }

        .alert {
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 25px;
            border: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-danger {
            background: #fff5f5;
            color: #c53030;
            border-left: 4px solid #c53030;
        }

        .alert-success {
            background: #f0fff4;
            color: #22543d;
            border-left: 4px solid #22543d;
        }

        .alert i {
            font-size: 18px;
        }

        .spinner-border {
            width: 20px;
            height: 20px;
            border-width: 2px;
            border-color: white transparent white transparent;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #94a3b8;
            font-size: 13px;
        }

        .footer-text a {
            color: #D4AF37;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-text a:hover {
            color: #B41E1E;
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #D4AF37;
        }

        .back-link i {
            margin-right: 5px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .logo-icon {
                width: 70px;
                height: 70px;
            }
            
            .logo-icon i {
                font-size: 35px;
            }
            
            .logo-wrapper h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Ornaments -->
    <div class="floating-ornament"></div>
    <div class="floating-ornament-2"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-wrapper">
                <div class="logo-icon">
                    <i class="fas fa-dharmachakra"></i>
                </div>
                <h2>Budaya Batak</h2>
                <div class="title-decoration">
                    <span></span>
                    <i class="fas fa-circle"></i>
                    <span></span>
                </div>
                <p>Administrator Panel</p>
            </div>

            <!-- Connection Status Alert -->
            <div class="alert alert-danger" id="connectionAlert" style="display: none;">
                <i class="fas fa-plug"></i>
                <span id="connectionMessage">Mencoba koneksi ke server...</span>
            </div>

            <!-- Error Alert -->
            <div class="alert alert-danger" id="errorAlert" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMessage">Email atau password salah!</span>
            </div>

            <!-- Success Alert -->
            <div class="alert alert-success" id="successAlert" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span id="successMessage">Login berhasil! Mengalihkan...</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" placeholder="admin@budayabatak.com" value="admin@budayabatak.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" value="batak123" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" checked>
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password" onclick="forgotPassword(); return false;">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none" id="loadingSpinner" role="status"></span>
                    <span id="loginText">Sign In to Dashboard</span>
                </button>
            </form>

            <!-- Link ke Website Utama -->
            <div class="text-center mt-3">
                <a href="http://localhost:5000" class="back-link" target="_blank">
                    <i class="fas fa-arrow-left"></i> Kembali ke Website Utama
                </a>
            </div>

            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <p><i class="fas fa-info-circle"></i> <strong>Demo Access</strong></p>
                <p><i class="fas fa-envelope"></i> Email: <strong>admin@budayabatak.com</strong></p>
                <p><i class="fas fa-key"></i> Password: <strong>batak123</strong></p>
            </div>

            <div class="footer-text">
                &copy; 2024 Budaya Batak. All rights reserved.<br>
                <a href="http://localhost:5000" target="_blank">Visit Website</a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // KONFIGURASI
        // ============================================
        const API_BASE_URL = 'http://localhost:5000';

        // ============================================
        // CEK KONEKSI SAAT HALAMAN DIMUAT
        // ============================================
        async function checkConnection() {
            const connectionAlert = document.getElementById('connectionAlert');
            const connectionMessage = document.getElementById('connectionMessage');
            
            try {
                connectionAlert.style.display = 'flex';
                connectionAlert.className = 'alert alert-warning';
                connectionMessage.textContent = 'Mengecek koneksi ke server...';
                
                const response = await fetch(`${API_BASE_URL}/api/test`);
                const data = await response.json();
                
                if (response.ok) {
                    connectionAlert.style.display = 'none';
                    console.log('✅ Server connected:', data);
                } else {
                    connectionAlert.className = 'alert alert-danger';
                    connectionMessage.textContent = '❌ Server merespon dengan error';
                }
            } catch (error) {
                connectionAlert.className = 'alert alert-danger';
                connectionMessage.innerHTML = '❌ <strong>Tidak dapat terhubung ke server!</strong><br>Pastikan backend sudah dijalankan dengan "npm run dev" di folder backend';
                console.error('Connection error:', error);
            }
        }

        // Panggil pengecekan koneksi
        checkConnection();

        // ============================================
        // FUNGSI LOGIN
        // ============================================
        async function login(email, password, remember) {
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const successAlert = document.getElementById('successAlert');
            const loginBtn = document.getElementById('loginBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const loginText = document.getElementById('loginText');
            
            try {
                // Show loading
                loginBtn.disabled = true;
                loadingSpinner.classList.remove('d-none');
                loginText.textContent = 'Authenticating...';
                
                console.log('Mencoba login ke:', `${API_BASE_URL}/api/auth/login`);
                
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (response.ok) {
                    // Store token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    if (remember) {
                        // Store for longer period (7 days)
                        const expiry = new Date();
                        expiry.setDate(expiry.getDate() + 7);
                        localStorage.setItem('token_expiry', expiry.toISOString());
                    }
                    
                    // Show success
                    successAlert.style.display = 'flex';
                    successAlert.querySelector('span').textContent = 'Login berhasil! Mengalihkan...';
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                    
                } else {
                    errorMessage.textContent = data.message || 'Login failed. Please check your credentials.';
                    errorAlert.style.display = 'flex';
                    
                    // Hide error after 5 seconds
                    setTimeout(() => {
                        errorAlert.style.display = 'none';
                    }, 5000);
                }
            } catch (error) {
                console.error('Login error detail:', error);
                errorMessage.innerHTML = `❌ <strong>Server error:</strong> ${error.message}.<br>Pastikan backend sudah dijalankan dengan "npm run dev" di folder backend.`;
                errorAlert.style.display = 'flex';
                
                setTimeout(() => {
                    errorAlert.style.display = 'none';
                }, 8000);
            } finally {
                // Hide loading
                loginBtn.disabled = false;
                loadingSpinner.classList.add('d-none');
                loginText.textContent = 'Sign In to Dashboard';
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            await login(email, password, remember);
        });

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePasswordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Forgot password handler
        function forgotPassword() {
            alert('Silakan hubungi administrator untuk mereset password Anda.\n\nEmail: admin@budayabatak.com');
        }

        // Check if already logged in
        (function checkAuth() {
            const token = localStorage.getItem('token');
            const expiry = localStorage.getItem('token_expiry');
            
            if (token && expiry) {
                const now = new Date();
                const expiryDate = new Date(expiry);
                
                if (now < expiryDate) {
                    console.log('Token masih valid, redirect ke dashboard');
                    window.location.href = 'dashboard.html';
                } else {
                    // Token expired, clear storage
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    localStorage.removeItem('token_expiry');
                }
            }
        })();

        // Add enter key support
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
